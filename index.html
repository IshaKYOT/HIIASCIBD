<body>

<div class="login-box text-center">
    <h1>𝜗ৎLOGIN FORM𝜗ৎ</h1>

    <input type="text" id="username" class="form-control mb-3" placeholder="👤 Enter Username">
    <input type="password" id="password" class="form-control mb-3" placeholder="🔒 Enter Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
    <button class="btn btn-secondary" onclick="clearForm()">Cancel</button>

    <br><br>

    <a href="#">Forgot username / password?</a>
</div>

<script>
var C_Username = "IshabelManalotoisveryKYOT";
var C_Password = "12345";
var attempts = 0;
var maxAttempts = 3;

function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if (username === C_Username && password === C_Password) {
        alert("This page says: Welcome " + username + " 💖");
        document.getElementById("message").innerHTML = "Login Successful!";
    } else {
        attempts++;

        if (attempts < maxAttempts) {
            alert("This page says: Incorrect username and/or password.");
            document.getElementById("message").innerHTML =
                "Attempts left: " + (maxAttempts - attempts);
        } else {
            alert("This page says: Account Locked 💔");
            document.getElementById("message").innerHTML =
                "Too many failed attempts. Refresh to try again.";
        }
    }
}
function clearForm() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").innerHTML = "";
}
</script>
